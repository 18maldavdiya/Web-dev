<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <pattern id="bg-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 40 M 0 0 L 40 40" fill="none" stroke="#E2E8F0" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="800" height="550" fill="#FCFDFF" />
  <rect x="0" y="0" width="800" height="550" fill="url(#bg-pattern)" />
  
  <!-- Outer Blue Border -->
  <rect x="20" y="20" width="760" height="510" rx="10" fill="none" stroke="url(#border-grad)" stroke-width="8" />
  <!-- Inner Gold Border -->
  <rect x="34" y="34" width="732" height="482" rx="6" fill="none" stroke="url(#gold-grad)" stroke-width="3" />

  <!-- Corner Ornaments -->
  <path d="M 20 50 L 50 20 M 20 60 L 60 20 M 20 70 L 70 20" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
  <path d="M 780 50 L 750 20 M 780 60 L 740 20 M 780 70 L 730 20" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
  <path d="M 20 500 L 50 530 M 20 490 L 60 530 M 20 480 L 70 530" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
  <path d="M 780 500 L 750 530 M 780 490 L 740 530 M 780 480 L 730 530" fill="none" stroke="url(#gold-grad)" stroke-width="2" />

  <!-- Certificate Heading -->
  <text x="400" y="100" font-family="'Times New Roman', Times, serif" font-size="36" font-weight="bold" fill="#1E3A8A" text-anchor="middle" letter-spacing="4">
    CERTIFICATE OF COMPLETION
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="135" font-family="'Poppins', sans-serif" font-size="14" fill="#6B7280" text-anchor="middle" letter-spacing="2">
    THIS CREDENTIAL IS PROUDLY PRESENTED TO
  </text>
  
  <!-- Student Name Placeholder -->
  <text x="400" y="210" font-family="'Times New Roman', Times, serif" font-size="42" font-style="italic" font-weight="bold" fill="#D97706" text-anchor="middle">
    John Doe
  </text>
  <line x1="200" y1="230" x2="600" y2="230" stroke="#E5E7EB" stroke-width="2" />
  
  <!-- Purpose description -->
  <text x="400" y="270" font-family="'Poppins', sans-serif" font-size="14" fill="#4B5563" text-anchor="middle">
    for successfully completing all requirements for the professional training course in
  </text>
  <!-- Course Name -->
  <text x="400" y="310" font-family="'Poppins', sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">
    Advanced Web Development &amp; Cloud Architecture
  </text>

  <!-- Details Row -->
  <text x="400" y="350" font-family="'Poppins', sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">
    Credential ID: OCVS-9872-4820 | Issued: June 28, 2026
  </text>

  <!-- Signatures -->
  <line x1="150" y1="450" x2="300" y2="450" stroke="#9CA3AF" stroke-width="1" />
  <text x="225" y="470" font-family="'Poppins', sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Authorized Signature</text>
  <text x="225" y="440" font-family="'Brush Script MT', cursive" font-size="24" fill="#1E3A8A" text-anchor="middle">E. Harrison</text>

  <line x1="500" y1="450" x2="650" y2="450" stroke="#9CA3AF" stroke-width="1" />
  <text x="575" y="470" font-family="'Poppins', sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Registrar Signature</text>
  <text x="575" y="440" font-family="'Brush Script MT', cursive" font-size="24" fill="#1E3A8A" text-anchor="middle">M. Sterling</text>

  <!-- Gold Seal -->
  <g transform="translate(400, 440) scale(0.9)">
    <circle cx="0" cy="0" r="35" fill="url(#gold-grad)" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <path d="M-15 15 L-25 45 L0 35 L25 45 L15 15 Z" fill="url(#gold-grad)" opacity="0.9" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FFFFFF" stroke-dasharray="3, 3" stroke-width="1.5" />
    <!-- Ribbon lines inside -->
    <path d="M-10 -15 L10 15 M-15 -10 L15 10" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
    <text x="0" y="5" font-family="'Poppins', sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VERIFIED</text>
  </g>
</svg>
