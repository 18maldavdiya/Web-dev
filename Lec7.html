<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Clone</title>
    <link rel="stylesheet" href="Lec7.css">
      <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    

    <!-- Top Navbar -->
    <header class="topbar">
        <div class="left">
            <span>File</span>
            <span>Resize</span>
            <span>🖋️Editing</span>
            <span>↩️</span>
            <span>↪️</span>
            <span>☑</span>
        </div>

        <div class="center">
            <h3>Sample</h3>
        </div>

        <div class="right">
            <button>📊</button>
            <button class="trial">💬</button>
            <button>Present</button>
            <button class="share">Share</button>
        </div>
    </header>

    <div class="container">
        <div class="left-panel">

    <div class="item active">
        <i class="fa-solid fa-table-cells-large"></i>
        <span>Templates</span>
    </div>

    <div class="item">
        <i class="fa-solid fa-shapes"></i>
        <span>Elements</span>
    </div>

    <div class="item">
        <i class="fa-solid fa-t"></i>
        <span>Text</span>
    </div>

    <div class="item">
        <i class="fa-solid fa-camera"></i>
        <span>Brand</span>
    </div>

    <div class="item">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>Uploads</span>
    </div>

    <div class="item">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <span>Tools</span>
    </div>

    <div class="item">
        <i class="fa-regular fa-folder"></i>
        <span>Projects</span>
    </div>

</div>
        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="search-box">
                <input type="text" placeholder="Describe your ideal design">
            </div>

            <div class="buttons">
                <button>Generate</button>
                <button>Search</button>
            </div>

            <div class="templates">
                <div class="card" ><img src="an1.png" height="120px" width="140px"></div>
                <div class="card"><img src="an2.png" height="120px" width="140px"></div>
                <div class="card"><img src="an3.png" height="120px" width="140px"></div>
                <div class="card"><img src="an3.png" height="120px" width="140px"></div>
                <div class="card"><img src="an4.png" height="120px" width="140px"></div>
                <div class="card"><img src="an5.png" height="120px" width="14b0px"></div>
            </div>

        </aside>

        <!-- Main Canvas -->
        <main class="workspace">

            <div class="toolbar">
                <span>Edit 🔴 ☰ ╭• ▦ &ensp; Effects</span>
                <span>Effects</span>
                <span>Animate</span>
                <span>Position</span>
            </div>

            <div class="canvas">

                <!-- Row 1 -->
                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <!-- Row 2 -->
                <div class="plus">+</div>
                <div class="parallelogram"></div>
                <div class="arrow"></div>
                <div class="heart"></div>

            </div>

            <div class="bottom-panel">
                <div class="page-preview"></div>
                <button class="add-page">+</button>
            </div>

        </main>

    </div>

</body>

</html>
