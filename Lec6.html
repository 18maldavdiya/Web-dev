<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Card Slider</title>
    <link rel="stylesheet" href="Lec6.css">
</head>

<body>

    <div class="container">


        <div class="card-stack">

            <div class="card top">
                <img src="an1.png" alt="">
            </div>

            <div class="card upper">
                <img src="an2.png"">
            </div>

            <div class="card active">
                <img src="an3.png" alt="">
            </div>

            <div class="card lower">
                <img src="an4.png" alt="">
            </div>

            <div class="card bottom">
                <img src="an5.png" alt="">
            </div>

        </div>


        <div class="content">

            <div class="buttons">
                <button>⬆️</button>
                <button>⬇️</button>
            </div>

            <h1>Luffy kun</h1>

            <div class="designation">
                <span></span>
                <p>MARKETING MANAGER</p>
                <span></span>
            </div>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span class="active-dot"></span>
                <span></span>
            </div>

        </div>

    </div>

</body>

</html>
